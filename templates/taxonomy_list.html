{% extends "index.html" %}

{% block content %}
<div class="posts">
  <h1 class="post-title">Categories</h1>
  <ul>
    {% for term in terms %}
      <li>
        <a href="{{ term.permalink }}">{{ term.name }}</a> ({{ term.pages | length }})
      </li>
    {% endfor %}
  </ul>
</div>
{% endblock content %}

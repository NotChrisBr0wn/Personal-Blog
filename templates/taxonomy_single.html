{% extends "index.html" %}

{% block content %}
<div class="posts">
  <h1 class="post-title">Category: {{ term.name }}</h1>
  <ul>
    {% for page in term.pages %}
      <li>
        <span>{{ page.date | date(format="%Y-%m-%d") }}</span> ::
        <a href="{{ page.permalink }}">{{ page.title }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
{% endblock content %}
